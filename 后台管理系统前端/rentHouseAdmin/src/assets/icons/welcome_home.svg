<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景天空 -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#sky)"/>
  
  <!-- 地面 -->
  <rect y="200" width="400" height="100" fill="#90EE90"/>
  
  <!-- 房子主体 -->
  <rect x="150" y="120" width="100" height="80" fill="#DEB887"/>
  
  <!-- 屋顶 -->
  <polygon points="140,120 200,80 260,120" fill="#8B4513"/>
  
  <!-- 门 -->
  <rect x="180" y="160" width="20" height="40" fill="#654321"/>
  <circle cx="195" cy="180" r="2" fill="#FFD700"/>
  
  <!-- 窗户 -->
  <rect x="160" y="140" width="15" height="15" fill="#87CEEB"/>
  <rect x="225" y="140" width="15" height="15" fill="#87CEEB"/>
  <line x1="167.5" y1="140" x2="167.5" y2="155" stroke="#FFF" stroke-width="1"/>
  <line x1="160" y1="147.5" x2="175" y2="147.5" stroke="#FFF" stroke-width="1"/>
  <line x1="232.5" y1="140" x2="232.5" y2="155" stroke="#FFF" stroke-width="1"/>
  <line x1="225" y1="147.5" x2="240" y2="147.5" stroke="#FFF" stroke-width="1"/>
  
  <!-- 烟囱 -->
  <rect x="220" y="90" width="12" height="25" fill="#8B4513"/>
  
  <!-- 烟 -->
  <circle cx="226" cy="85" r="3" fill="#D3D3D3" opacity="0.7"/>
  <circle cx="230" cy="80" r="4" fill="#D3D3D3" opacity="0.5"/>
  <circle cx="235" cy="75" r="3" fill="#D3D3D3" opacity="0.3"/>
  
  <!-- 太阳 -->
  <circle cx="350" cy="50" r="20" fill="#FFD700"/>
  <line x1="330" y1="30" x2="335" y2="35" stroke="#FFD700" stroke-width="2"/>
  <line x1="365" y1="35" x2="370" y2="30" stroke="#FFD700" stroke-width="2"/>
  <line x1="330" y1="70" x2="335" y2="65" stroke="#FFD700" stroke-width="2"/>
  <line x1="365" y1="65" x2="370" y2="70" stroke="#FFD700" stroke-width="2"/>
  
  <!-- 花朵 -->
  <circle cx="100" cy="220" r="5" fill="#FF69B4"/>
  <circle cx="95" cy="215" r="3" fill="#FF1493"/>
  <circle cx="105" cy="215" r="3" fill="#FF1493"/>
  <circle cx="95" cy="225" r="3" fill="#FF1493"/>
  <circle cx="105" cy="225" r="3" fill="#FF1493"/>
  <line x1="100" y1="225" x2="100" y2="235" stroke="#228B22" stroke-width="2"/>
  
  <!-- 标题 -->
  <text x="200" y="260" text-anchor="middle" fill="#2F4F4F" font-family="Arial" font-size="22" font-weight="bold">温馨租房之家</text>
  <text x="200" y="280" text-anchor="middle" fill="#696969" font-family="Arial" font-size="14">让每个人都有家的感觉</text>
</svg>