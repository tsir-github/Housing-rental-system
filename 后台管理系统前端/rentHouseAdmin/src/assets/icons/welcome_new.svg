<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#F8FAFC"/>
  
  <!-- 房屋图标 -->
  <rect x="150" y="80" width="100" height="80" rx="8" fill="#3B82F6"/>
  <rect x="160" y="90" width="20" height="20" fill="#60A5FA"/>
  <rect x="190" y="90" width="20" height="20" fill="#60A5FA"/>
  <rect x="220" y="90" width="20" height="20" fill="#60A5FA"/>
  <rect x="160" y="120" width="20" height="20" fill="#60A5FA"/>
  <rect x="190" y="120" width="20" height="20" fill="#60A5FA"/>
  <rect x="220" y="120" width="20" height="20" fill="#60A5FA"/>
  <rect x="175" y="140" width="50" height="20" rx="4" fill="#1E40AF"/>
  
  <!-- 装饰元素 -->
  <circle cx="100" cy="120" r="30" fill="#F59E0B" opacity="0.2"/>
  <circle cx="320" cy="100" r="25" fill="#10B981" opacity="0.2"/>
  <circle cx="80" cy="200" r="20" fill="#EF4444" opacity="0.2"/>
  <circle cx="340" cy="180" r="15" fill="#8B5CF6" opacity="0.2"/>
  
  <!-- 文字 -->
  <text x="200" y="220" text-anchor="middle" fill="#1F2937" font-family="Arial" font-size="24" font-weight="bold">租房管理系统</text>
  <text x="200" y="250" text-anchor="middle" fill="#6B7280" font-family="Arial" font-size="16">欢迎使用现代化租房管理平台</text>
</svg>